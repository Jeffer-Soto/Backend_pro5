<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Tienda Batarazo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="login-container">

    <!-- Logo -->
    <div class="logo-container">
      <h1>🦸 Tienda Batarazo</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <!-- Formulario -->
    <div class="form-container">

      <ion-item>
        <ion-label position="floating">Correo electrónico</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="correo"
          placeholder="correo@ejemplo.com">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="clave"
          placeholder="••••••••">
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        color="primary"
        class="login-btn"
        (click)="login()">
        Iniciar Sesión
      </ion-button>

    </div>

  </div>

</ion-content>
